<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ứng dụng Xem Video 360° Cảm Biến</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <style>
        /* Giao diện nút bấm điều khiển trên màn hình */
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            gap: 10px;
        }
        .btn {
            background: rgba(0, 0, 0, 0.6);
            color: white;
            border: 2px solid white;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-family: sans-serif;
            font-size: 14px;
            transition: 0.3s;
        }
        .btn:hover {
            background: white;
            color: black;
        }
        /* Giao diện yêu cầu quyền truy cập cảm biến trên iOS */
        #permission-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            font-family: sans-serif;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div id="permission-overlay">
        <h2>Ứng dụng Video 360°</h2>
        <p>Ứng dụng cần quyền truy cập cảm biến chuyển động để xoay video theo điện thoại của bạn.</p>
        <button class="btn" id="start-btn">Bắt đầu trải nghiệm</button>
    </div>

    <div id="controls" style="display: none;">
        <button class="btn" id="play-btn">Phát</button>
        <button class="btn" id="pause-btn">Tạm dừng</button>
    </div>

    <a-scene loading-screen="enabled: false">
        <a-assets>
            <video id="video360" 
                   src="assets/Everest 16K. Aerial 360 video trailer in 8K.mp4" 
                   preload="auto" 
                   crossorigin="anonymous" 
                   loop="true" 
                   webkit-playsinline 
                   playsinline>
            </video>
        </a-assets>

        <a-camera look-controls="magicWindowTrackingEnabled: true; touchEnabled: true;"></a-camera>

        <a-videosphere src="#video360" rotation="0 -90 0"></a-videosphere>
    </a-scene>

    <script>
        const video = document.getElementById('video360');
        const overlay = document.getElementById('permission-overlay');
        const controls = document.getElementById('controls');
        const startBtn = document.getElementById('start-btn');
        const playBtn = document.getElementById('play-btn');
        const pauseBtn = document.getElementById('pause-btn');

        // Hàm kích hoạt video và cảm biến
        function initApp() {
            // Ẩn lớp phủ, hiện thanh điều khiển
            overlay.style.display = 'none';
            controls.style.display = 'flex';
            
            // Phát video (Trình duyệt chặn tự động phát nếu không có tương tác user)
            video.play();
        }

        // Xử lý kích hoạt (Đặc biệt quan trọng cho iPhone/iOS)
        startBtn.addEventListener('click', function() {
            // Kiểm tra nếu là thiết bị iOS yêu cầu cấp quyền DeviceOrientation
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            initApp();
                        } else {
                            alert('Bạn đã từ chối quyền truy cập cảm biến. Hãy tải lại trang để cấp quyền lại.');
                            initApp(); // Vẫn chạy nhưng chỉ dùng tay vuốt được
                        }
                    })
                    .catch(console.error);
            } else {
                // Đối với Android hoặc PC không cần xin quyền qua popup
                initApp();
            }
        });

        // Điều khiển nút Play/Pause
        playBtn.addEventListener('click', () => video.play());
        pauseBtn.addEventListener('click', () => video.pause());
    </script>
</body>
</html>
